services:
  ai-service:
    build:
      context: ./backend/ai-service-python
    env_file: ./backend/ai-service-python/.env
    environment:
      TRANSLATION_DB_PATH: /data/translations.db
    volumes:
      - ai-cache:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  gateway:
    build:
      context: .
      dockerfile: backend/gateway-node/Dockerfile.compose
    environment:
      AI_SERVICE_URL: http://ai-service:8000
      PORT: 8787
    ports:
      - "8787:8787"
    depends_on:
      ai-service:
        condition: service_healthy

volumes:
  ai-cache: {}
