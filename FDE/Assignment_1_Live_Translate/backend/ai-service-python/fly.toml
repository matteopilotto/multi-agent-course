# fly.toml app configuration file generated for ai-service-python on 2026-07-12T15:07:51+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-service-python'
primary_region = 'iad'

[build]
[http_service]
  internal_port = 8000
  # Flycast traffic is plain HTTP on the private 6PN network. With force_https
  # the Fly proxy 301-redirects http://…flycast to https://…flycast, which has no
  # valid internal TLS cert, so the gateway can't reach us. Keep this false.
  force_https = false
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
