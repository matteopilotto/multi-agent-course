# fly.toml app configuration file generated for ai-service-python on 2026-07-12T15:07:51+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-service-python'
primary_region = 'iad'

[build]

# Private service: this app has NO public IP. It is reachable only from inside
# the Fly org over Flycast, at http://ai-service-python.flycast (the gateway
# points AI_SERVICE_URL here). Keep the [http_service] block so traffic still
# goes through the Fly proxy — that's what lets a stopped machine auto-start
# on the next request. force_https is off because Flycast traffic is plain
# HTTP on the private network; there's no public TLS to enforce.
[http_service]
  internal_port = 8000
  force_https = false
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
