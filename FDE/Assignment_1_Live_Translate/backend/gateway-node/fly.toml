# fly.toml app configuration file generated for matteopilotto-livetranslate-gw on 2026-07-12T15:57:16+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'matteopilotto-livetranslate-gw'
# US multi-region: iad (US-East, primary) + sjc (US-West). Machines are added to
# both regions with `fly scale count 2 --region iad,sjc` (see backend/DEPLOY.md).
# Fly's Anycast routes each client to the nearest healthy gateway machine.
primary_region = 'iad'

[build]
[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep one machine warm in the primary region (iad) so US-East users never hit a
  # cold start on the public hot path. Applies to the primary region only, so sjc
  # (US-West) scales to 0 when idle — one-time cold start there in exchange for cost.
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
