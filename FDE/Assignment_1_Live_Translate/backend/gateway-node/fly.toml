# fly.toml app configuration file generated for matteopilotto-livetranslate-gw on 2026-07-12T15:57:16+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'matteopilotto-livetranslate-gw'
# Multi-region: fra (EU, primary/warm) + iad (US-East, secondary). Fly's Anycast
# routes each client to the nearest healthy gateway machine. Add the iad machine by
# cloning an fra machine into iad — see backend/DEPLOY.md.
primary_region = 'fra'

[build]
[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep one machine warm in the primary region (fra) so EU users never hit a cold
  # start on the public hot path. Applies to the primary region only, so iad
  # (US-East) scales to 0 when idle — one-time cold start there in exchange for cost.
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
